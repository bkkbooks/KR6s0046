body:
  text: 一切恭敬敬禮常住三寶是衆嚴智香食願此香花雲變滿十方界供養一切佛化并菩薩無數聲聞受此香花雲以謂光明臺光以無邊界無邊無量作佛是供養與供敬一切並誦摩訶般若波羅蜜如來妙色身世間無以等無比不思議是故今敬禮如來色無盡智慧亦復然一切法常住時歸敬禮常住三寶歎佛功德佛有三十二相八十隨好號三界度衆生所成佛道南無東方須彌燈光明如來十方佛等一切諸佛南無毗婆尸如來過去七佛等一切諸佛南無普光如來五十三佛等一切諸佛南無東方善德如來十方無量佛等一切諸佛南無拘那提如來賢劫千佛等一切諸佛南無釋迦如來三十五佛等一切諸佛南無東方阿閦如來一萬五千佛等一切諸佛南無保集如來二十五佛等一切諸佛南無法光明清淨開方蓮華佛南無虛空功德清淨微衆等目端正功德相光明花波頭磨琉璃光寶體香最上香供養訖種種莊嚴敬敬無量無邊日月光明願力莊嚴變化莊嚴法界出生障礙王如來南無豪相日月光明花願寶蓮華堅如金剛身如毗盧遮那無障礙眼圓滿十方放光照一切佛叉相王如來普為上界天先龍凡八部帝主人王師僧父母十方施主及以邊法界衆生悉願斷持知障歸命懺悔至心懺悔一切業障海皆從望相生若欲懺悔者端坐觀實相衆罪如霜露慧日能消徐是故應至心勤懺六根罪懺悔以歸命禮三寶至心發願願我等生生是諸佛世世恆聞解脫者弘誓平等度衆生必竟造成無上道發願以歸命禮三寶說偈發願願以此功德普及於一切我等以衆生皆共成佛道白衆等聽說黃昏無常偈西方日以暮塵勞有微塵老病死時至相看不居念念催年足猶如少水魚勸諸行道衆勤學至無畏白衆等聽說初夜無常偈煩惱無底生死海無邊度苦船未至云何樂睡眠睡眠當覺悟勿令睡覆心勇猛勤精進菩提道自然敬禮毗盧遮那佛敬禮盧舍那佛敬禮釋迦牟尼佛敬禮東方善德佛敬禮東南方無憂得佛敬禮南方旃檀佛敬禮西南方寶勝佛敬禮西方無量明佛敬禮西北方花得佛敬禮北方相得佛敬禮東北方三勝行佛敬禮上方廣衆得佛敬禮下明得佛敬禮當來下生彌勒尊佛敬禮過現未來十方三世一切諸佛敬禮舍利形像無量寶塔敬禮十二部尊經甚深法藏敬禮諸大菩薩摩訶薩衆敬禮聲聞緣覺一切賢聖一切恭敬為龍八部諸善神王敬禮常住三寶為過現諸師恆為道首敬禮常住三寶為帝王聖化無窮敬禮常住三寶為太子諸王福延萬葉敬禮常住三寶為師僧父母及善知識敬禮常住三寶為十方施主六度圓滿敬禮常住三寶為受苦衆生願皆離苦敬禮常住三寶為文路百官恆其祿位敬禮常住三寶為國土安寧法輪常轉敬禮常住三寶為法界有情禮佛懺悔至心懺悔十方無量佛所知無不盡我今悉已前發露回三惡三三合九種從三煩惱起今身若前身有罪皆懺悔於三惡道中若應受業報願得今身常不入惡道受懺悔已歸命禮三寶至心勸請十方諸如來現在成道者我請轉法輪安樂諸衆生十方一切佛若欲捨受命我今頭命禮勸請令久住勸請以歸命禮三寶至心隨喜所有布施福持戒修禪惠從身口意生起來今所有習學三乘人具足一乘者無量人天福衆等皆隨喜隨命禮三寶至心回向我所作福業一切皆和合為度群生故政回向佛道罪應如是懺勸請隨喜福回向於菩提回向以歸命禮三寶至心發願願諸衆生等悉發菩提心經心常思念十方一切佛伏願諸衆生永破諸煩惱了了見佛姓猶如妙德佛發願以歸命禮三寶白衆等聽說寅朝清淨偈欲救寂滅樂當學沙門法衣食支身命精麁諸衆等今日寅朝清淨各記六念一切恭敬自歸佛當願衆生體學大道發無常意自歸依法當願衆生深入經藏智慧如海自歸僧當願衆生統理大衆一切無礙願諸衆生三業清淨奉持佛教和南一切賢聖顯德二年乙卯歲四月二十二日大玄寺僧辛願進記
